services:
  - type: web
    name: moneytrack-ai-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: FRONTEND_ORIGIN
        value: https://money-track-sandy.vercel.app
      - key: LIFF_APP_BASE_URL
        value: https://liff.line.me/2010521304-BrGvBhsP
      - key: LINE_LOGIN_CHANNEL_ID
        value: "2010521304"
      - key: LINE_AUTH_REQUIRED
        value: "1"
      - key: LINE_WEBHOOK_ALLOW_UNSIGNED
        value: "0"
      - key: ENABLE_LINE_WEBHOOK_MOCK
        value: "0"
      - key: SEED_DEMO_DATA
        value: "0"
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_RICH_MENU_MAIN_ID
        sync: false
      - key: CRON_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: moneytrack-ai-db
          property: connectionString

databases:
  - name: moneytrack-ai-db
    plan: free
    databaseName: moneytrack
    user: moneytrack
